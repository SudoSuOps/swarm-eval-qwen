# Sampling Configuration — SwarmJudge-4B-CRE-B0
# Base: Qwen3-4B (standard transformer + GQA)
# Source: https://huggingface.co/Qwen/Qwen3-4B
#
# CRITICAL: Never use do_sample=False on Qwen3.
# CRITICAL: Qwen3 has think mode ON by default — must set enable_thinking=False

family: qwen3
think_mode_default: true  # Must explicitly disable for judge inference

# Judge inference
judge:
  do_sample: true
  temperature: 0.7
  top_p: 0.8
  top_k: 20
  min_p: 0.0
  presence_penalty: 1.5
  repetition_penalty: 1.0
  max_new_tokens: 512
  enable_thinking: false

# Deterministic eval
eval_deterministic:
  do_sample: true
  temperature: 0.1
  top_p: 0.8
  top_k: 20
  min_p: 0.0
  presence_penalty: 1.5
  repetition_penalty: 1.0
  max_new_tokens: 512
  enable_thinking: false

# Special tokens (Qwen3 tokenizer)
tokens:
  eos_token: "<|im_end|>"
